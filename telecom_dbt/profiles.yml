# dbt profiles.yml — kết nối đến PostgreSQL
# Đặt file này tại: ~/.dbt/profiles.yml
# HOẶC dùng --profiles-dir để chỉ định thư mục custom

telecom_dbt:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      dbname: "{{ env_var('POSTGRES_DB', 'telecom_db') }}"
      user: "{{ env_var('POSTGRES_USER', 'postgres') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'changeme') }}"
      schema: analytics
      threads: 4
      keepalives_idle: 0
      connect_timeout: 10

    # Profile cho chạy trong Docker (kết nối tới service postgres)
    docker:
      type: postgres
      host: postgres
      port: 5432
      dbname: "{{ env_var('POSTGRES_DB', 'telecom_db') }}"
      user: "{{ env_var('POSTGRES_USER', 'postgres') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'changeme') }}"
      schema: analytics
      threads: 4
