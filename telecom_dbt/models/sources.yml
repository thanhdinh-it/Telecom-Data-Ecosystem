version: 2

sources:
  - name: raw
    description: "Raw data từ batch pipeline (PySpark output hoặc trực tiếp từ PostgreSQL raw schema)"
    schema: raw
    tables:
      - name: daily_cdr_agg
        description: "Daily CDR aggregation từ PySpark batch job"
        columns:
          - name: caller_id
            description: "ID subscriber thực hiện cuộc gọi"
            tests:
              - not_null
          - name: call_date
            description: "Ngày ghi nhận (partition key)"
            tests:
              - not_null
          - name: total_calls
            description: "Tổng số cuộc gọi trong ngày"
            tests:
              - not_null
          - name: voice_calls
            tests:
              - not_null
          - name: video_calls
            tests:
              - not_null

      - name: customers
        description: "Bảng khách hàng từ data_generator"
        columns:
          - name: customer_id
            tests:
              - unique
              - not_null
          - name: plan_type
            tests:
              - accepted_values:
                  values: ['basic', 'standard', 'premium']

  - name: public
    description: "Streaming output từ PySpark Fraud Detection"
    schema: public
    tables:
      - name: fraud_alerts
        description: "Fraud alerts từ PySpark Structured Streaming"
        columns:
          - name: id
            tests:
              - unique
              - not_null
          - name: caller_id
            tests:
              - not_null
          - name: call_count
            description: "Số cuộc gọi trong window → > 50 = fraud"
            tests:
              - not_null
